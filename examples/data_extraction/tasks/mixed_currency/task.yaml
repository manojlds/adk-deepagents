name: mixed_currency
instruction: |
  Read the file /workspace/input.txt containing a financial report with
  amounts in different currencies. Extract all transactions as structured JSON.
  Write the result to /workspace/output.json.
  The JSON should contain a "transactions" array, each with: description,
  amount, and currency (ISO 4217 code).
input_file: input.txt
output_file: output.json
