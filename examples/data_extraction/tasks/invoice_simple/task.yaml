name: invoice_simple
instruction: |
  Read the file /workspace/input.txt and extract all invoice data as structured JSON.
  Write the result to /workspace/output.json.
  The JSON should contain: vendor, invoice_number, date, due_date, line_items
  (each with description, quantity, unit_price, total), subtotal, tax, and grand_total.
input_file: input.txt
output_file: output.json
