name: receipt_multiline
instruction: |
  Read the file /workspace/input.txt containing a store receipt.
  Extract all items, prices, and totals as structured JSON.
  Write the result to /workspace/output.json.
  The JSON should contain: store_name, date, items (each with name, price),
  subtotal, tax, and total.
input_file: input.txt
output_file: output.json
